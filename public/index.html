<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - Smart Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <header>
            <div class="info">
                <div class="status-dot"></div>
                <div>
                    <h1>AI Chatbot</h1>
                    <p class="tagline">Smartest AI Companion</p>
                </div>
            </div>
            <div class="theme-badge">Pro AI</div>
        </header>
        
        <div id="chat-box" class="chat-box">
            <div id="initial-loader" class="initial-loader">
                <div class="spinner"></div>
                <p>AI Assistant is waking up...</p>
            </div>
            <!-- Messages will appear here -->
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Kuch bhi puchiye..." autocomplete="off">
            </div>
            <button id="send-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
        <footer class="app-footer">
            <p>Made with <span>♥</span> by <span class="author">Saket Raj</span></p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
